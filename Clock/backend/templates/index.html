<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock Sigye</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation" id="bgAnimation"></div>
    
    <div class="container">
        <header class="header">
            <h1 class="title">
                
                CLOCK SIGYE
                
            </h1>
            <p class="subtitle">Tu portal al tiempo mundial</p>
        </header>

        <div class="timezone-selector">
            <label for="countrySelect" class="selector-label">
                
                Selecciona una zona horaria:
            </label>
            <select id="countrySelect" class="country-select">
                {% for country, info in timezones.items() %}
                <option value="{{ country }}" {% if country == 'Colombia' %}selected{% endif %}>
                    {{ info.flag }} {{ country }} - {{ info.city }} ({{ info.gmt }})
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="clock-container">
            <div class="location-info">
                <span class="flag" id="countryFlag">🇨🇴</span>
                <div class="location-details">
                    <h2 class="country-name" id="countryName">Colombia</h2>
                    <p class="city-name" id="cityName">Pasto</p>
                    <p class="gmt-info" id="gmtInfo">GMT-5</p>
                </div>
            </div>

             
            <div class="analog-clock-wrapper">
                <svg class="analog-clock" viewBox="0 0 200 200" id="analogClock">
                     Clock face 
                    <circle cx="100" cy="100" r="95" class="clock-face" />
                    
                     Hour markers 
                    <g class="hour-markers">
                        <line x1="100" y1="10" x2="100" y2="20" class="hour-marker" />
                        <line x1="100" y1="180" x2="100" y2="190" class="hour-marker" />
                        <line x1="10" y1="100" x2="20" y2="100" class="hour-marker" />
                        <line x1="180" y1="100" x2="190" y2="100" class="hour-marker" />
                        <line x1="150" y1="25" x2="145" y2="32" class="hour-marker" />
                        <line x1="175" y1="50" x2="168" y2="55" class="hour-marker" />
                        <line x1="175" y1="150" x2="168" y2="145" class="hour-marker" />
                        <line x1="150" y1="175" x2="145" y2="168" class="hour-marker" />
                        <line x1="50" y1="175" x2="55" y2="168" class="hour-marker" />
                        <line x1="25" y1="150" x2="32" y2="145" class="hour-marker" />
                        <line x1="25" y1="50" x2="32" y2="55" class="hour-marker" />
                        <line x1="50" y1="25" x2="55" y2="32" class="hour-marker" />
                    </g>
                    
                     Hour hand 
                    <line x1="100" y1="100" x2="100" y2="50" class="hour-hand" id="hourHand" />
                    
                     Minute hand 
                    <line x1="100" y1="100" x2="100" y2="35" class="minute-hand" id="minuteHand" />
                    
                     Second hand 
                    <line x1="100" y1="100" x2="100" y2="25" class="second-hand" id="secondHand" />
                    
                     Center dot 
                    <circle cx="100" cy="100" r="5" class="center-dot" />
                </svg>
            </div>

            <div class="time-display">
                <div class="digital-clock">
                    <span class="time-digit" id="hours">00</span>
                    <span class="time-separator">:</span>
                    <span class="time-digit" id="minutes">00</span>
                    <span class="time-separator">:</span>
                    <span class="time-digit" id="seconds">00</span>
                    <span class="am-pm" id="amPm">A.M.</span>
                </div>
                <div class="date-display" id="dateDisplay">Cargando fecha...</div>
            </div>

            
            <div class="clock-controls">
                <button class="control-btn" id="decreaseHour" title="Retrasar 1 hora">
                    <span>◄◄</span> Hora
                </button>
                <button class="control-btn" id="increaseHour" title="Adelantar 1 hora">
                    Hora <span>►►</span>
                </button>
                <button class="control-btn" id="decreaseMinute" title="Retrasar 1 minuto">
                    <span>◄◄</span> Min
                </button>
                <button class="control-btn" id="increaseMinute" title="Adelantar 1 minuto">
                    Min <span>►►</span>
                </button>
                <button class="control-btn reset-btn" id="resetTime" title="Volver a hora actual">
                    ⟳ Reiniciar
                </button>
            </div>

            <div class="period-indicator" id="periodIndicator">
                
                <span class="period-text" id="periodText">DÍA</span>
            </div>
        </div>

        <div class="motivational-section">
            <div class="phrase-container">
                <p class="motivational-phrase" id="motivationalPhrase">
                    ¡Aprovecha el día, tus metas te esperan!
                </p>
            </div>
        </div>

        <div class="world-clocks">
            <h3 class="section-title">Otras zonas horarias</h3>
            <div class="world-clocks-grid" id="worldClocksGrid">
                 Se llenará dinámicamente con JavaScript 
            </div>
        </div>
    </div>

    <footer class="footer">
        <p class="footer-note">Hora real sincronizada • Actualización automática • Valeria Góngora</p>
    </footer>

    <script src="{{ url_for('static', filename='js/App.js') }}"></script>
</body>
</html>
